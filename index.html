<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمد نواف</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Tajawal:wght@300;400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* الألوان الجديدة: تدرجات الأصفر والذهبي */
            --primary: #ffc107;      /* أصفر أساسي */
            --secondary: #ffe066;    /* أصفر فاتح */
            --accent: #ff9800;       /* برتقالي/ذهبي للتناقض */
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 25, 40, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        body {
            font-family: 'Tajawal', 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(255, 193, 7, 0.10), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 152, 0, 0.10), transparent 25%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 30px 15px;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* شريط التمرير العلوي */
        .scroll-indicator {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            z-index: 999;
            box-shadow: 0 0 10px var(--primary);
        }

        /* زر اللغة */
        .language-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 700;
            color: var(--text-main);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        [dir="rtl"] .language-toggle {
            left: auto;
            right: 20px;
        }

        .language-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1150px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* تأثير الزجاج الشفاف للبطاقات */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* الهيدر / الملف الشخصي */
        .hero {
            text-align: center;
            position: relative;
            overflow: hidden;
            padding: 50px 30px;
        }

        .hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(180deg, rgba(255, 193, 7, 0.1) 0%, transparent 100%);
            border-radius: 24px 24px 0 0;
        }

        .profile-img-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 25px;
        }

        /* تعديل إطار الصورة ليصبح أنيق ونظيف */
        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            box-shadow: 0 10px 30px rgba(255, 193, 7, 0.3);
            background-color: var(--bg-color); /* يمنع ظهور الألوان من الخلفية إذا كانت الصورة شفافة */
        }

        .online-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 22px;
            height: 22px;
            background: var(--success);
            border-radius: 50%;
            border: 4px solid var(--bg-color);
            box-shadow: 0 0 15px var(--success);
        }

        .hero h1 {
            font-size: 3em;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .hero .title {
            font-size: 1.2em;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero .location {
            font-size: 0.95em;
            color: var(--text-muted);
            margin-bottom: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 15px;
            border-radius: 20px;
        }

        .contact-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .contact-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .contact-pill:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 193, 7, 0.15);
        }

        .contact-pill i {
            color: var(--primary);
            font-size: 1.1em;
        }

        /* تخطيط المحتوى الرئيسي */
        .layout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .main-column {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .side-column {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* العناوين والأقسام */
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5em;
            font-weight: 800;
            margin-bottom: 25px;
            color: #fff;
        }

        .section-header i {
            color: var(--primary);
            background: rgba(255, 193, 7, 0.1);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 0.8em;
        }

        /* شبكة الملفات السريعة */
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 10px;
        }

        .file-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .file-card:hover {
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.1), rgba(255, 152, 0, 0.05));
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .file-card i {
            font-size: 2em;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .file-card h4 {
            font-size: 0.95em;
            margin-bottom: 5px;
        }

        .file-card p {
            font-size: 0.75em;
            color: var(--text-muted);
        }

        /* عناصر الخبرة والمشاريع */
        .timeline-item {
            position: relative;
            padding-right: 30px;
            margin-bottom: 30px;
        }

        [dir="ltr"] .timeline-item {
            padding-left: 30px;
            padding-right: 0;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            right: 0;
            top: 5px;
            bottom: -30px;
            width: 2px;
            background: rgba(255, 255, 255, 0.1);
        }

        [dir="ltr"] .timeline-item::before {
            left: 0;
            right: auto;
        }

        .timeline-item:last-child::before {
            display: none;
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 5px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        [dir="ltr"] .timeline-item::after {
            left: -4px;
            right: auto;
        }

        .job-title {
            font-size: 1.15em;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .project-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--primary);
            font-size: 0.85em;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-top: 8px;
            padding: 5px 10px;
            border-radius: 6px;
            background: rgba(255, 193, 7, 0.1);
        }

        .project-link:hover {
            background: rgba(255, 193, 7, 0.2);
            transform: translateX(-3px);
        }

        [dir="rtl"] .project-link:hover {
            transform: translateX(3px);
        }

        .job-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
            font-size: 0.85em;
            flex-wrap: wrap;
        }

        .company-name {
            color: var(--secondary);
            font-weight: 600;
        }

        .date-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 20px;
            color: var(--text-muted);
        }

        .description-list {
            list-style: none;
        }

        .description-list li {
            position: relative;
            padding-right: 18px;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: var(--text-muted);
        }

        [dir="ltr"] .description-list li {
            padding-left: 18px;
            padding-right: 0;
        }

        .description-list li::before {
            content: '◀';
            position: absolute;
            right: 0;
            color: var(--accent);
            font-size: 0.8em;
        }

        [dir="ltr"] .description-list li::before {
            content: '▹';
            left: 0;
            right: auto;
        }

        /* المهارات */
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill-tag {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85em;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .skill-tag i {
            color: var(--secondary);
        }

        .skill-tag:hover {
            background: rgba(255, 193, 7, 0.1);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .skill-tag.security i {
            color: var(--accent);
        }

        /* القائمة الجانبية */
        .side-item {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border-right: 3px solid var(--primary);
            transition: all 0.3s ease;
        }

        [dir="ltr"] .side-item {
            border-left: 3px solid var(--primary);
            border-right: none;
        }

        .side-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(-5px);
        }

        [dir="ltr"] .side-item:hover {
            transform: translateX(5px);
        }

        .side-item h4 {
            font-size: 0.95em;
            margin-bottom: 5px;
            color: #fff;
        }

        .side-item p {
            font-size: 0.8em;
            color: var(--text-muted);
        }

        .course-highlight {
            color: #cbd5e1;
            font-size: 0.9em;
            line-height: 1.6;
            margin-top: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
        }

        /* قسم QR */
        .qr-box {
            text-align: center;
            padding: 10px;
        }

        .qr-image {
            width: 160px;
            height: 160px;
            background: #fff;
            padding: 8px;
            border-radius: 16px;
            margin: 0 auto 15px;
            display: block;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .qr-image:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }

        /* تصميم متجاوب للجوال */
        @media (max-width: 900px) {
            .layout-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 15px 10px;
            }

            .glass-card {
                padding: 25px 20px;
                border-radius: 20px;
            }

            .hero h1 {
                font-size: 2.2em;
            }

            .profile-img-container {
                width: 110px;
                height: 110px;
            }

            .contact-pill {
                padding: 8px 15px;
                font-size: 0.8em;
                width: 100%;
                justify-content: center;
            }

            .files-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .file-card {
                padding: 15px 10px;
            }

            .file-card i {
                font-size: 1.5em;
            }

            .section-header {
                font-size: 1.3em;
            }

            .section-header i {
                width: 35px;
                height: 35px;
                font-size: 0.85em;
            }

            .timeline-item {
                padding-right: 20px;
            }

            [dir="ltr"] .timeline-item {
                padding-left: 20px;
                padding-right: 0;
            }

            .job-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }

            .language-toggle {
                top: 10px;
                right: auto;
                left: 10px;
                padding: 6px 12px;
                font-size: 0.8em;
            }
        }
    </style>
</head>
